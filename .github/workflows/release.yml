name: Release

# Triggered by `package.ps1 -Publish`, which tags and pushes vX.Y.Z.
# Runs on the hosted runner (not locally) because RimWorld's own DLLs can't be
# built against here - they're Ludeon's copyrighted files. Instead this packages
# the Assemblies/ already committed to the repo (built + committed locally).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package
        shell: pwsh
        run: ./.build/package.ps1 -SkipBuild

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $zip = Get-Item dist/*.zip
          gh release create "$env:GITHUB_REF_NAME" $zip.FullName --title "$env:GITHUB_REF_NAME" --notes "Release $env:GITHUB_REF_NAME"
